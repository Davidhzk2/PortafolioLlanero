<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <style>

      body{
        background-color: #868686;
      }
        .typing-container {
  font-family: 'Courier New', monospace; /* O la fuente tech que prefieras */
  font-size: 2rem;
  color:black;
}

#typing-text {
  color: var(--purple); /* Usando tu variable */
  font-weight: bold;
}

.cursor {
  display: inline-block;
  width: 3px;
  background-color: black;
  margin-left: 5px;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
    </style>
    <div class="typing-container">
  <span>Somos </span>
  <span id="typing-text"></span>
  <span class="cursor">|</span>
</div>
    
    <script>
        const textElement = document.getElementById('typing-text');
const words = ['Innovación', 'Desarrollo', 'Estrategia', 'Diseño'];
let wordIndex = 0;
let charIndex = 0;
let isDeleting = false;
let typeSpeed = 150;

function type() {
  const currentWord = words[wordIndex];
  
  if (isDeleting) {
    // Borrando: quita un carácter
    textElement.textContent = currentWord.substring(0, charIndex - 1);
    charIndex--;
    typeSpeed = 100; // Borra más rápido
  } else {
    // Escribiendo: añade un carácter
    textElement.textContent = currentWord.substring(0, charIndex + 1);
    charIndex++;
    typeSpeed = 200;
  }

  // Lógica de cambio de estado
  if (!isDeleting && charIndex === currentWord.length) {
    // Terminó de escribir, pausa antes de borrar
    isDeleting = true;
    typeSpeed = 2000; 
  } else if (isDeleting && charIndex === 0) {
    // Terminó de borrar, pasa a la siguiente palabra
    isDeleting = false;
    wordIndex = (wordIndex + 1) % words.length;
    typeSpeed = 500;
  }

  setTimeout(type, typeSpeed);
}

// Iniciar la animación
document.addEventListener('DOMContentLoaded', type);
    </script>
</body>
</html>
